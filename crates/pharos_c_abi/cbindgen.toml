# cbindgen configuration for pharos_c_abi.
#
# Generate the C header with:
#   cbindgen --config crates/pharos_c_abi/cbindgen.toml \
#            --crate pharos_c_abi \
#            --output crates/pharos_c_abi/include/pharos.h

language = "C"
header = """
/*
 * PharosEngine C ABI
 *
 * AUTO-GENERATED — do not edit by hand. Regenerate via:
 *   cbindgen --config crates/pharos_c_abi/cbindgen.toml \\
 *            --crate pharos_c_abi \\
 *            --output crates/pharos_c_abi/include/pharos.h
 */
"""
include_guard = "PHAROS_H"
autogen_warning = "/* Warning: auto-generated by cbindgen. Do not edit. */"
cpp_compat = true
style = "type"
usize_is_size_t = true

[export]
prefix = "pharos_"
