name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Create virtual environment
      run: python -m venv .venv

    - name: Add venv to PATH (Unix)
      if: runner.os != 'Windows'
      run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

    - name: Add venv to PATH (Windows)
      if: runner.os == 'Windows'
      run: echo "${{ github.workspace }}\.venv\Scripts" >> $env:GITHUB_PATH
      shell: pwsh

    - name: Install maturin
      run: pip install maturin

    - name: Build and install (development)
      run: maturin develop --extras dev
      env:
        RUST_BACKTRACE: "1"

    - name: Run tests
      run: pytest tests/ -v --tb=short

    - name: Build and install with 3D feature
      run: maturin develop --features 3d --extras dev

    - name: Run 3D tests
      run: pytest tests/test_lazy_3d.py tests/test_bake_pipeline.py tests/test_mixed_2d_3d.py -v

  wheel-size:
    name: Wheel size check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install maturin
      run: pip install maturin

    - name: Build core wheel (2D only)
      run: maturin build --release -o dist/

    - name: Check core wheel size (<20 MB)
      run: |
        WHEEL=$(ls dist/*.whl | head -1)
        SIZE=$(stat -c%s "$WHEEL")
        MAX=$((20 * 1024 * 1024))
        echo "Core wheel: $WHEEL"
        echo "Size: $(( SIZE / 1024 / 1024 )) MB"
        if [ "$SIZE" -gt "$MAX" ]; then
          echo "ERROR: Core wheel exceeds 20 MB limit!"
          exit 1
        fi

    - name: Build 3D wheel
      run: maturin build --release --features 3d -o dist3d/

    - name: Check 3D wheel size (<35 MB)
      run: |
        WHEEL=$(ls dist3d/*.whl | head -1)
        SIZE=$(stat -c%s "$WHEEL")
        MAX=$((35 * 1024 * 1024))
        echo "3D wheel: $WHEEL"
        echo "Size: $(( SIZE / 1024 / 1024 )) MB"
        if [ "$SIZE" -gt "$MAX" ]; then
          echo "ERROR: 3D wheel exceeds 35 MB limit!"
          exit 1
        fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Create virtual environment
      run: python -m venv .venv

    - name: Add venv to PATH
      run: echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

    - name: Install tools
      run: pip install maturin ruff

    - name: Build extension
      run: maturin develop

    - name: Lint Python
      run: ruff check python/ --select E,F,W --ignore E501

    - name: Check Rust (2D)
      run: cargo check

    - name: Check Rust (3D)
      run: cargo check --features 3d
