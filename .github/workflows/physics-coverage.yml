name: Physics Coverage

on:
  push:
    paths:
      - 'python/slappyengine/physics/**'
      - 'python/tests/test_*.py'
      - 'config/physics.yml'
      - '.github/workflows/physics-coverage.yml'
  pull_request:
    paths:
      - 'python/slappyengine/physics/**'

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov numpy pyyaml Pillow scipy wgpu
      - name: Run physics tests with coverage
        run: |
          export PYTHONPATH=python
          pytest \
            --cov=python/slappyengine/physics \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --cov-report=html:htmlcov \
            python/tests/test_conservation.py \
            python/tests/test_drop_scenarios.py \
            python/tests/test_visual_drops.py \
            python/tests/test_gpu_kernel.py \
            python/tests/test_hull_subdivide.py \
            python/tests/test_boundary_exchange.py \
            python/tests/test_ccd.py \
            python/tests/test_extended_materials.py \
            python/tests/test_oriented_aabb.py \
            python/tests/test_spawn_fragment.py \
            python/tests/test_wall_contacts.py \
            python/tests/test_boundary_exchange_integration.py \
            python/tests/test_stiction.py \
            python/tests/test_renderer_lighting.py \
            python/tests/test_post_process.py \
            python/tests/test_shadows.py \
            python/tests/test_particles.py \
            python/tests/test_video.py \
            python/tests/test_debug_hud.py \
            python/tests/test_deform_adapter.py \
            python/tests/test_crack_repair_adapter.py \
            python/tests/test_engine_bridge.py \
            python/tests/test_physics_scene_loader.py \
            python/tests/test_physics_events.py \
            python/tests/test_demo_vehicle.py \
            python/tests/test_demo_projectile.py \
            python/tests/test_demo_sand_pile.py \
            python/tests/test_demo_lava_flow.py \
            python/tests/test_demo_materials_gallery.py \
            python/tests/test_benchmarks.py \
            python/tests/test_memory_budget.py \
            python/tests/test_physics_profiles.py
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: physics
          name: physics-coverage
          fail_ci_if_error: false
      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: physics-coverage-html
          path: htmlcov/
      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: physics-coverage-xml
          path: coverage.xml
