# Default post-process chain — matches slappyengine.post_process.DEFAULT_CHAIN.
#
# bloom (Lottes smooth-knee + Karis pyramid composite)
#   -> taa (temporal blend + YCoCg variance clip)
#   -> tonemap (ACES fit)
#   -> dither (Bayer 8x8 quantisation smear)
#
# This is the safe, all-around preset the engine ships enabled at boot.
passes:
  - name: bloom
    kind: bloom
    enabled: true
    params:
      strength: 1.0
      threshold: 1.0
      knee: 0.2
      mip_count: 6
    depends_on: []
  - name: taa
    kind: taa
    enabled: true
    params:
      alpha: 0.1
    depends_on:
      - bloom
  - name: tonemap
    kind: tonemap
    enabled: true
    params:
      exposure_ev: 0.0
      mode: 0
    depends_on:
      - taa
  - name: dither
    kind: dither
    enabled: true
    params:
      strength: 0.00392156862745098
    depends_on:
      - tonemap
