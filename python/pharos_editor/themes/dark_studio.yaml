# Pharos theme — dark_studio
#
# Editor-desk atmosphere with a graphite paper feel: near-black background,
# soft slate panels, cyan accents, subtle brushed edges. Optimised for
# long night sessions.

name: dark_studio
display_name: Dark Studio
description: >
  A graphite-dark theme with cyan accents and understated washi tape,
  meant for late-night editing.
tags: [dark, studio, high-focus]

palette:
  bg:              [18, 20, 26, 255]
  bg_alt:          [24, 28, 36, 255]
  panel_bg:        [28, 32, 42, 240]
  panel_border:    [55, 62, 75, 255]

  text:            [220, 226, 235, 255]
  text_secondary:  [155, 165, 180, 255]
  text_disabled:   [90, 100, 115, 255]

  accent_pink:     [220, 110, 170, 255]
  accent_teal:     [95, 205, 220, 255]
  accent_yellow:   [230, 195, 105, 255]
  accent_purple:   [175, 140, 220, 255]

  ok:              [95, 205, 175, 255]
  warn:            [230, 195, 105, 255]
  error:           [230, 105, 115, 255]

  selection_bg:    [50, 60, 80, 220]
  selection_edge:  [95, 205, 220, 255]

typography:
  base_family: Inter
  base_size_px: 14
  header_family: Inter
  header_size_px: 18
  mono_family: JetBrains Mono
  mono_size_px: 13

geometry:
  window_rounding: 8
  frame_rounding: 6
  child_rounding: 8
  border_size: 1
  padding_x: 10
  padding_y: 8
  spacing_x: 6
  spacing_y: 4

washi_tape:
  variant: minimal
  density: low        # low | medium | high

page_lining:
  style: dot_grid     # off | rule | dot_grid | isometric
  density: medium

edge_stroke:
  width: 1.0
  style: brushed      # crisp | brushed | pencil | none

accessibility:
  colorblind_safe: true
  contrast_ratio_body_text: 8.4
  supports_large_text_mode: true
