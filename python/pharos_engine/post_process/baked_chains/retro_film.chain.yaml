# Retro film preset — soft bloom + subtle film grain for a warm cinematic feel.
#
# The grain pass is a custom kind; the stub handler that ships with
# ChainBaker is a pass-through so the pipeline stays intact on the CPU
# harness. Downstream GPU consumers can register a real grain handler
# without editing this YAML.
passes:
  - name: bloom
    kind: bloom
    enabled: true
    params:
      strength: 0.2
      threshold: 1.0
      knee: 0.4
      mip_count: 5
    depends_on: []
  - name: grain
    kind: custom
    enabled: true
    params:
      handler: grain
      intensity: 0.05
    depends_on:
      - bloom
  - name: tonemap
    kind: tonemap
    enabled: true
    params:
      exposure_ev: -0.2
      mode: 1
      gamma: 1.1
    depends_on:
      - grain
  - name: dither
    kind: dither
    enabled: true
    params:
      strength: 0.00392156862745098
    depends_on:
      - tonemap
