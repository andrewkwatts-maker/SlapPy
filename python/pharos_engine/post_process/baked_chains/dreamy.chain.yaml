# Dreamy preset — heavy bloom + loose TAA for a soft, ethereal look.
#
# The extra bloom mips (8 vs default 6) spread highlights further, the
# reduced strength keeps the bloom from clipping to white, and the
# widened TAA variance-clip gamma (1.4 vs default 1.0) lets more history
# leak through — producing the slight motion-trail smear associated with
# dream / cinematic sequences.
passes:
  - name: bloom
    kind: bloom
    enabled: true
    params:
      strength: 0.6
      threshold: 0.8
      knee: 0.3
      mip_count: 8
    depends_on: []
  - name: taa
    kind: taa
    enabled: true
    params:
      alpha: 0.15
      variance_clip_gamma: 1.4
    depends_on:
      - bloom
  - name: tonemap
    kind: tonemap
    enabled: true
    params:
      exposure_ev: 0.0
      mode: 0
    depends_on:
      - taa
  - name: dither
    kind: dither
    enabled: true
    params:
      strength: 0.00392156862745098
    depends_on:
      - tonemap
